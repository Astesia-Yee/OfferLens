<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#9333EA" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="56" fill="url(#bg)" />

  <!-- Chat Bubble (Interview) -->
  <g filter="url(#shadow)">
    <path d="M 48 88 C 48 66 66 48 88 48 L 152 48 C 174 48 192 66 192 88 L 192 136 C 192 158 174 176 152 176 L 104 176 L 56 208 L 68 164 C 56 152 48 138 48 120 Z" fill="#FFFFFF" opacity="0.25" />
    
    <!-- Waveform (Voice Recording) -->
    <rect x="84" y="100" width="8" height="24" rx="4" fill="#FFFFFF" opacity="0.95" />
    <rect x="100" y="88" width="8" height="48" rx="4" fill="#FFFFFF" opacity="0.95" />
    <rect x="116" y="76" width="8" height="72" rx="4" fill="#FFFFFF" opacity="0.95" />
    <rect x="132" y="92" width="8" height="40" rx="4" fill="#FFFFFF" opacity="0.95" />
    <rect x="148" y="104" width="8" height="16" rx="4" fill="#FFFFFF" opacity="0.95" />
  </g>

  <!-- Magnifying Glass (Review/Lens) -->
  <g filter="url(#shadow)">
    <circle cx="168" cy="168" r="44" fill="#FFFFFF" opacity="0.1" />
    <circle cx="168" cy="168" r="44" fill="none" stroke="#FFFFFF" stroke-width="14" />
    <line x1="199" y1="199" x2="232" y2="232" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round" />
  </g>

  <!-- AI Spark (AI) -->
  <g filter="url(#glow)">
    <path d="M 168 136 Q 168 168 200 168 Q 168 168 168 200 Q 168 168 136 168 Q 168 168 168 136 Z" fill="#FDE047" />
    <path d="M 168 148 Q 168 168 188 168 Q 168 168 168 188 Q 168 168 148 168 Q 168 168 168 148 Z" fill="#FFFFFF" />
  </g>
</svg>
